<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Area administrativa para atualizar placares do Bolao Copa 2026." />
    <title>Admin - Bolao Copa 2026</title>
    <link rel="stylesheet" href="styles.css?v=17" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="trophy-logo" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <path d="M20 10h24v10c0 10-5 17-12 20-7-3-12-10-12-20V10Z" />
              <path d="M20 16H9c0 10 5 17 14 18M44 16h11c0 10-5 17-14 18" />
              <path d="M32 40v8M23 54h18M20 60h24" />
            </svg>
          </span>
          <div>
            <p class="eyebrow">Area administrativa</p>
            <h1>Atualizar placares</h1>
          </div>
        </div>
        <a class="secondary-link" href="index.html">Ver bolao</a>
      </header>

      <main class="admin-shell">
        <form class="auth-card admin-access" id="adminLoginForm">
          <div>
            <p class="eyebrow">Acesso restrito</p>
            <h2>Entrar como administrador</h2>
          </div>
          <label>
            Codigo do administrador
            <input id="adminCode" type="password" placeholder="Codigo admin" autocomplete="off" />
          </label>
          <button class="primary-button" type="submit">Liberar resultados</button>
          <small>Codigo do prototipo: ADMIN2026</small>
        </form>

        <section class="admin-dashboard hidden" id="adminPanel">
          <section class="panel admin-participants-panel">
            <div class="panel-heading compact">
              <div>
                <p class="eyebrow">Grupo fechado</p>
                <h2>Participantes</h2>
              </div>
              <strong class="score-badge" id="adminParticipantTotal">0</strong>
            </div>
            <p class="admin-note">Nesta versao estatica, estes dados sao lidos do armazenamento deste navegador.</p>
            <div class="admin-participant-list" id="adminParticipantList"></div>
          </section>

          <section class="panel admin-page-panel">
            <div class="panel-heading compact">
              <div>
                <p class="eyebrow">Resultados oficiais</p>
                <h2>Atualizar placares</h2>
              </div>
            </div>
            <div class="toolbar">
              <label>
                Data
                <select id="adminDaySelect"></select>
              </label>
              <label>
                Fase
                <select id="adminRoundSelect"></select>
              </label>
            </div>
            <div class="match-list" id="adminResultList"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=17"></script>
    <script src="supabase-state.js?v=17"></script>
    <script src="data.js?v=17"></script>
    <script src="admin.js?v=17"></script>
  </body>
</html>
